{{ if .IsHome }}
<!-- SoftwareApplication Schema for Homepage -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "SoftwareApplication",
  "name": "Zellij",
  "applicationCategory": "DeveloperApplication",
  "operatingSystem": ["Linux", "macOS"],
  "offers": {
    "@type": "Offer",
    "price": "0",
    "priceCurrency": "USD"
  },
  "description": "{{ .Site.Params.description }}",
  "url": "{{ .Site.BaseURL }}",
  "downloadUrl": "{{ .Site.BaseURL }}documentation/installation.html",
  "screenshot": "{{ .Site.BaseURL }}img/floating-panes-preview.png",
  "author": {
    "@type": "Organization",
    "name": "Zellij",
    "url": "{{ .Site.BaseURL }}"
  }
}
</script>
{{ end }}

{{ if in .Permalink "/tutorials/" }}
<!-- VideoObject Schema for Tutorials -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "VideoObject",
  "name": "{{ .Title }}",
  "description": "{{ .Description }}",
  "thumbnailUrl": "{{ if .Params.images }}{{ index .Params.images 0 }}{{ end }}",
  "uploadDate": "{{ .Date }}",
  "contentUrl": "{{ .Permalink }}"
}
</script>
{{ end }}

{{ if in .Permalink "/news/" }}
<!-- BlogPosting Schema for News Posts -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BlogPosting",
  "headline": "{{ .Title }}",
  "datePublished": "{{ .Date }}",
  "author": {
    "@type": "Person",
    "name": "{{ if .Params.author }}{{ .Params.author }}{{ else }}Zellij Team{{ end }}",
    "url": "https://poor.dev"
  },
  "description": "{{ .Description }}",
  {{ if .Params.images }}"image": "{{ index .Params.images 0 }}",{{ end }}
  "url": "{{ .Permalink }}"
}
</script>
{{ end }}

{{ if in .Permalink "/faq/" }}
<!-- FAQPage Schema -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "name": "{{ .Title }}",
  "description": "{{ .Description }}",
  "url": "{{ .Permalink }}",
  "mainEntity": [
    {{ $sections := split .RawContent "## " }}
    {{ range $index, $section := after 1 $sections }}
      {{ if gt $index 0 }},{{ end }}
      {{ $firstNewline := index (findRE `(?s)^[^\n]+` $section) 0 }}
      {{ $question := $firstNewline | plainify }}
      {{ $rest := replaceRE `(?s)^[^\n]+\n+` "" $section }}
      {{ $answer := $rest | plainify }}
      {
        "@type": "Question",
        "name": "{{ $question }}",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": {{ $answer | jsonify }}
        }
      }
    {{ end }}
  ]
}
</script>
{{ end }}
